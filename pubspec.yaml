name: lpg_tracker_wok
description: Production-quality LPG gas consumption tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2
  fl_chart: ^1.2.0
  connectivity_plus: ^7.1.0

icons_launcher:
  image_path: "assets/icons/app_icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0

flutter:
  uses-material-design: true
